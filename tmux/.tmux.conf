# Use fish as default shell
set -g default-command fish

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"

# Enable mouse support
set -g mouse on

# Rebind prefix to Ctrl+A
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Window navigation (with repeat)
bind -r j previous-window
bind -r k next-window

# Pane navigation with Ctrl+X prefix
bind -n C-x switch-client -T pane-nav
bind -T pane-nav h select-pane -L
bind -T pane-nav j select-pane -D
bind -T pane-nav k select-pane -U
bind -T pane-nav l select-pane -R

# Pane resizing (prefix + Shift+hjkl, repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ========== LOAD CUSTOM CONFIG ==========

source-file ~/.tmux_custom.conf
